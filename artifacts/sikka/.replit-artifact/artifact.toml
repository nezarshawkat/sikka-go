kind = "web"
previewPath = "/"
title = "Sikka - Cairo Transit"
version = "1.0.0"
id = "artifacts/sikka"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18322

[services.development]
run = "pnpm --filter @workspace/sikka run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sikka", "run", "build" ]
publicDir = "artifacts/sikka/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18322"
BASE_PATH = "/"
